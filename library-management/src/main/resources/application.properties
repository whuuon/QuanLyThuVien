# Tên ứng dụng
spring.application.name=Library Management System

# Database MySQL Configuration
# Thêm tên database library_db và tham số tự tạo database nếu chưa có
spring.datasource.url=jdbc:mysql://localhost:3306/library_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=root
spring.datasource.password=123456

# JPA & Hibernate
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# QUAN TRỌNG: Cấu hình để chạy file data.sql
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Server Port
server.port=8080

# Swagger/OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
# Ẩn các khối code JSON phức tạp (Schemas)
springdoc.swagger-ui.default-models-expand-depth=-1
# Luôn mở sẵn các ô nhập để "Click là hiện ngay"
springdoc.swagger-ui.doc-expansion=full
# Cho phép thử nghiệm ngay lập tức
springdoc.swagger-ui.try-it-out-enabled=true
# Ẩn các thông tin thời gian chạy gây rối mắt
springdoc.swagger-ui.display-request-duration=false